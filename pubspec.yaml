name: imageflow
description: An intelligent image processing app with face detection and document scanning.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # ML Kit
  google_mlkit_face_detection: ^0.12.0
  google_mlkit_text_recognition: ^0.14.0

  # Image processing
  image: ^4.2.0
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.2
  open_filex: ^4.5.0

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
